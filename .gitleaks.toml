# I5.4: gitleaks config. Inherits the bundled default ruleset and adds an
# allowlist so documented placeholders / test fixtures don't fail CI.
title = "riviso gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Known-safe placeholders and test fixtures"
paths = [
  '''(^|/)\.env\.example$''',
  '''(^|/).*\.md$''',
  '''(^|/)backend/tests/''',
]
regexes = [
  # CI uses a clearly non-production SECRET_KEY in workflows.
  '''ci-test-secret-key-not-used-in-production-\d+''',
  '''(?i)your[-_]?(api[-_]?key|secret|token|password)[-_]?here''',
  '''(?i)(example|dummy|placeholder|changeme|test)[-_]?(secret|token|key|password)''',
]
