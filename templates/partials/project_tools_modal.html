{# Modal shell for Tools — include once per project page (sidebar + JS depend on #projectToolsModal). #}
<div class="modal fade" id="projectToolsModal" tabindex="-1" aria-labelledby="projectToolsModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title h5" id="projectToolsModalLabel">Tools</h2>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="app-tools-modal-wrap">
          {% include 'partials/project_tools_accordion.html' %}
        </div>
      </div>
    </div>
  </div>
</div>
