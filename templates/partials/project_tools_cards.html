{# Tools — 5-card row + modal popup (reuses accordion UI inside modal) #}
<div class="tool-cards-grid row row-cols-2 row-cols-md-3 row-cols-xl-5 g-3 mb-3" role="list" aria-label="Project tools">
  <div class="col-12">
    <div class="d-flex flex-wrap gap-2 justify-content-end">
      <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('download_wordpress_plugin', project_id=project.id) }}">Download WordPress plugin</a>
    </div>
  </div>
  <div class="col" role="listitem">
    <button type="button" class="app-tool-card app-card app-card--elevated p-3 w-100 text-start" data-bs-toggle="modal" data-bs-target="#projectToolsModal" data-open-tool="bulk_upload">
      <div class="d-flex align-items-start gap-2">
        <span class="app-tool-card__icon" aria-hidden="true">
          <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z"/></svg>
        </span>
        <div class="min-w-0 flex-grow-1">
          <div class="fw-semibold">Bulk Upload</div>
          <div class="small text-body-secondary">Import many rows (Excel)</div>
        </div>
      </div>
    </button>
  </div>
  <div class="col" role="listitem">
    <button type="button" class="app-tool-card app-card app-card--elevated p-3 w-100 text-start" data-bs-toggle="modal" data-bs-target="#projectToolsModal" data-open-tool="writing_prompts">
      <div class="d-flex align-items-start gap-2">
        <span class="app-tool-card__icon" aria-hidden="true">
          <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293zm-1.75 2.456-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z"/><path fill-rule="evenodd" d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5v11z"/></svg>
        </span>
        <div class="min-w-0 flex-grow-1">
          <div class="fw-semibold">Writing Prompt</div>
          <div class="small text-body-secondary">{{ (project.prompts|default([]))|length }} saved</div>
        </div>
      </div>
    </button>
  </div>
  <div class="col" role="listitem">
    <button type="button" class="app-tool-card app-card app-card--elevated p-3 w-100 text-start" data-bs-toggle="modal" data-bs-target="#projectToolsModal" data-open-tool="image_prompts">
      <div class="d-flex align-items-start gap-2">
        <span class="app-tool-card__icon" aria-hidden="true">
          <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M6.002 5.5a1.5 1.5 0 0 1-3 0 1.5 1.5 0 0 1 3 0z"/><path d="M2.002 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2h-12zm12 1a1 1 0 0 1 1 1v6.256l-3.293-3.293a1 1 0 0 0-1.414 0L4.5 12.086V13h7.5a.5.5 0 0 0 0-1H6.707l4.147-4.146a.5.5 0 0 1 .708 0L15 11.293V3a1 1 0 0 1-1-1h-12z"/></svg>
        </span>
        <div class="min-w-0 flex-grow-1">
          <div class="fw-semibold">Image Prompt</div>
          <div class="small text-body-secondary">{{ (project.image_prompts|default([]))|length }} saved</div>
        </div>
      </div>
    </button>
  </div>
  <div class="col" role="listitem">
    <button type="button" class="app-tool-card app-card app-card--elevated p-3 w-100 text-start" data-bs-toggle="modal" data-bs-target="#projectToolsModal" data-open-tool="context_links">
      <div class="d-flex align-items-start gap-2">
        <span class="app-tool-card__icon" aria-hidden="true">
          <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M4.715 6.542 3.343 7.914a3 3 0 1 0 4.243 4.243l1.828-1.829A3 3 0 0 0 8.586 5.5L8 6.086a1.002 1.002 0 0 0-.154.43 1 1 0 1 0 1.49-.872l.846-.846a2 2 0 1 1 2.829 2.828L11.657 9.914a2 2 0 0 1-2.829 0l-.849-.849a1 1 0 1 1 1.415-1.415l.849.849a1 1 0 0 0 1.414 0l1.829-1.828a1 1 0 0 0 0-1.415l-.849-.849a1 1 0 1 1 1.415-1.415l.849.849a3 3 0 0 1 0 4.243l-1.828 1.829a3 3 0 0 1-4.243 0l-.849-.849a1 1 0 1 1 1.415-1.415l.849.849a1 1 0 0 0 1.414 0l.846-.846a1 1 0 0 0-.154-1.43l-1.828-1.829A3 3 0 0 0 4.715 6.542Z\"/></svg>
        </span>
        <div class="min-w-0 flex-grow-1">
          <div class="fw-semibold">Context Links</div>
          <div class="small text-body-secondary">{{ (project.context_links|default([]))|length }} phrase{{ 's' if (project.context_links|default([]))|length != 1 else '' }}</div>
        </div>
      </div>
    </button>
  </div>
  <div class="col" role="listitem">
    <button type="button" class="app-tool-card app-card app-card--elevated p-3 w-100 text-start" data-bs-toggle="modal" data-bs-target="#projectToolsModal" data-open-tool="search_console">
      <div class="d-flex align-items-start gap-2">
        <span class="app-tool-card__icon" aria-hidden="true">
          <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z\"/></svg>
        </span>
        <div class="min-w-0 flex-grow-1">
          <div class="fw-semibold">Search Console</div>
          <div class="small text-body-secondary">{% if project.gsc_property_url %}Linked{% else %}Not set{% endif %}</div>
        </div>
      </div>
    </button>
  </div>
</div>

<div class="modal fade" id="projectToolsModal" tabindex="-1" aria-labelledby="projectToolsModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title h5" id="projectToolsModalLabel">Tools</h2>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="app-tools-modal-wrap">
          {% include 'partials/project_tools_accordion.html' %}
        </div>
      </div>
    </div>
  </div>
</div>
