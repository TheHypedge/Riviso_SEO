{# Layer 1: sticky project bar — single primary CTA #}
{% set pui = plan_ui if plan_ui is defined else {} %}
<header class="app-proj-header sticky-top mb-4" role="banner">
  <div class="app-proj-header__inner d-flex flex-column flex-md-row gap-3 align-items-start align-items-md-center justify-content-between">
    <div class="min-w-0 flex-grow-1">
      <h1 class="app-dash-title mb-1">{{ project.name }}</h1>
      <a class="app-dash-site-link small text-break d-inline-block" href="{{ project.website_url }}" target="_blank" rel="noopener noreferrer">{{ project.website_url }}</a>
    </div>
    <div class="flex-shrink-0">
      <button type="button" class="btn app-btn-primary btn-lg px-4 shadow-sm" data-bs-toggle="modal" data-bs-target="#addArticleModal" {% if pui.cannot_add_article|default(false) %}disabled title="Article quota reached for your plan (total, daily, or monthly)."{% endif %}>
        <span class="app-dash-cta-icon" aria-hidden="true">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/></svg>
        </span>
        Add Article/Post
      </button>
    </div>
  </div>
</header>
