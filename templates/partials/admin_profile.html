<section class="app-dash-section" aria-labelledby="admin-profile-heading">
  <div class="app-section-head">
    <h2 id="admin-profile-heading" class="app-section-head__title">Settings / Profile</h2>
    <p class="app-section-head__desc mb-0">Update your personal details (email is read-only).</p>
  </div>

  <div class="app-card app-card--elevated">
    <div class="p-3 p-md-4">
      <form method="post" action="{{ url_for('update_profile') }}" class="vstack gap-3" style="max-width: 42rem;">
        <div class="row g-3">
          <div class="col-12 col-md-6">
            <label class="form-label fw-medium" for="profileFullName">Full name</label>
            <input class="form-control" id="profileFullName" name="full_name" value="{{ (current_user.full_name or '') }}" maxlength="200" placeholder="Your name">
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label fw-medium" for="profilePhone">Phone</label>
            <input class="form-control" id="profilePhone" name="phone" value="{{ (current_user.phone or '') }}" maxlength="64" placeholder="+1 555 0100">
          </div>
        </div>
        <div class="row g-3">
          <div class="col-12 col-md-6">
            <label class="form-label fw-medium" for="profileEmail">Email (read-only)</label>
            <input class="form-control" id="profileEmail" value="{{ current_user.email }}" disabled>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label fw-medium" for="profilePlan">Current plan</label>
            <input class="form-control" id="profilePlan" value="{{ (current_user.subscription_type or 'beta')|capitalize }}" disabled>
          </div>
        </div>
        <div class="row g-3">
          <div class="col-12 col-md-6">
            <label class="form-label fw-medium" for="profileJoined">Joined on</label>
            <input class="form-control" id="profileJoined" value="{{ current_user.created_at or '—' }}" disabled>
          </div>
        </div>
        <div class="d-flex justify-content-end">
          <button type="submit" class="btn btn-primary">Save profile</button>
        </div>
      </form>
    </div>
  </div>
</section>
