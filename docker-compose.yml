services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: auto_articles
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      # Prefer `backend/.env` on machines where you store real secrets.
      # `backend/.env.example` is a tracked template for fresh clones/VPS setups.
      - ./backend/.env.example
      - ./backend/.env
    environment:
      POSTGRES_DSN: postgresql+asyncpg://app:app@postgres:5432/auto_articles
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    profiles: ["full"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    profiles: ["full"]
    image: nginx:1.27
    ports:
      - "8080:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:

