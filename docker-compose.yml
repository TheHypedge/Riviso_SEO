services:
  # ------------------------------------------------------------------
  # Frontend — Next.js production server.
  # riviso.cloud DNS points at this VPS; host nginx terminates TLS and
  # proxies riviso.cloud → 127.0.0.1:3000. Browser calls same-origin
  # /api/*, which Next rewrites to BACKEND_URL (see next.config).
  # Bound to 127.0.0.1 only — never expose 3000 publicly.
  # ------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
      PORT: "3000"
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:3000/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 768m
    cpus: 1.0

  # ------------------------------------------------------------------
  # Redis — generation queue + rate-limiter shared store
  # ------------------------------------------------------------------
  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  # ------------------------------------------------------------------
  # API process — FastAPI, no in-process scheduler/worker.
  # ------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      ENABLE_SCHEDULER: "0"
      ENABLE_GENERATION_WORKER: "0"
    volumes:
      - app_data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 768m
    cpus: 1.0

  # ------------------------------------------------------------------
  # Generation worker — drains the Redis generation queue.
  # ------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "app.run_background"]
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      ENABLE_GENERATION_WORKER: "1"
      ENABLE_SCHEDULER: "0"
    volumes:
      - app_data:/app/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import os,time; p='/tmp/riviso_worker.heartbeat'; d=os.path.getmtime(p) if os.path.exists(p) else 0; exit(0 if time.time()-d<120 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 1024m
    cpus: 1.0

  # ------------------------------------------------------------------
  # Scheduler — APScheduler loop + daily subscription reset.
  # Run exactly ONE replica — more causes double-fired jobs.
  # ------------------------------------------------------------------
  scheduler:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "app.run_background"]
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      ENABLE_SCHEDULER: "1"
      ENABLE_GENERATION_WORKER: "0"
    volumes:
      - app_data:/app/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import os,time; p='/tmp/riviso_scheduler.heartbeat'; d=os.path.getmtime(p) if os.path.exists(p) else 0; exit(0 if time.time()-d<120 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    cpus: 0.5

  # ------------------------------------------------------------------
  # Nginx — API gateway on port 80.
  # TLS terminates at Cloudflare/edge; nginx receives plain HTTP and
  # forwards X-Forwarded-Proto so HSTS + redirects work correctly.
  # Frontend is hosted on Vercel — nginx proxies only the backend.
  # ------------------------------------------------------------------
  nginx:
    image: nginx:1.27
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend

volumes:
  redis_data:
  app_data:
