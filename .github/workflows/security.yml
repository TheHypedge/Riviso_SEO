# I5.4: dependency vulnerability audit (pip-audit) + secret scanning (gitleaks).
# Fails the PR on a known-vulnerable dependency or a leaked secret.
name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # weekly Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    name: pip-audit (Python deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit==2.9.0
      - name: Audit backend requirements
        run: |
          # Starlette 1.0.1 fix is not yet compatible with pinned FastAPI; ignore until upstream ships.
          pip-audit -r backend/requirements.txt --strict \
            --ignore-vuln PYSEC-2026-161 \
            --ignore-vuln GHSA-7f5h-v6xp-fcq8

  npm-audit:
    name: npm audit (frontend deps)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          npm install -g npm@11
          npm ci
      - name: Audit (fail on high+, except xlsx — no upstream fix)
        run: |
          npm audit --audit-level=high --json > audit.json || true
          node <<'EOF'
          const d = require("./audit.json");
          const skip = new Set(["xlsx"]);
          const bad = [];
          for (const [name, v] of Object.entries(d.vulnerabilities || {})) {
            if (skip.has(name)) continue;
            if (v.severity === "high" || v.severity === "critical") bad.push(`${name} (${v.severity})`);
          }
          if (bad.length) {
            console.error("High/critical npm vulnerabilities:", bad.join(", "));
            process.exit(1);
          }
          console.log("npm audit passed (xlsx advisory accepted — no fix available)");
          EOF

  gitleaks:
    name: gitleaks (secret scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz | tar -xz
          sudo install -m 755 gitleaks /usr/local/bin/gitleaks
      - name: Scan for secrets
        run: gitleaks detect --source . --config .gitleaks.toml --no-banner --redact
