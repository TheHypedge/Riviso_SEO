name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          script_stop: false
          script: |
            set -Eeuo pipefail

            APP_DIR="/var/www/auto-articles"
            VENV_DIR="$APP_DIR/venv"
            BACKUP_ENV="/tmp/auto-articles.env.bak"
            BACKUP_DATA="/tmp/auto-articles.data.bak"

            echo "Starting deployment..."
            cd "$APP_DIR"

            # Ensure git trust
            git config --global --add safe.directory "$APP_DIR" || true

            PREV_COMMIT="$(git rev-parse HEAD)"

            echo "Backing up runtime state..."
            [[ -f ".env" ]] && cp -f .env "$BACKUP_ENV" || true
            if [[ -d "data" ]]; then
              rm -rf "$BACKUP_DATA" || true
              cp -a data "$BACKUP_DATA" || true
            fi

            echo "Fetching latest code..."
            git fetch --prune origin main
            git reset --hard origin/main

            echo "Restoring environment..."
            [[ -f "$BACKUP_ENV" ]] && cp -f "$BACKUP_ENV" .env || true
            if [[ -d "$BACKUP_DATA" ]]; then
              rm -rf data || true
              cp -a "$BACKUP_DATA" data || true
            fi
            chmod 600 .env 2>/dev/null || true

            echo "Activating virtualenv..."
            source "$VENV_DIR/bin/activate"

            echo "Installing dependencies..."
            python -m pip install --upgrade pip --quiet --disable-pip-version-check
            pip install -r requirements.txt --quiet --disable-pip-version-check

            sed -i 's/\r$//' deploy/deploy.sh

            echo "Running deploy script..."
            bash deploy/deploy.sh

            echo "Reloading services..."
            sudo systemctl reload gunicorn || true
            sudo systemctl reload nginx || true

            echo "Health check..."
            sleep 3
            curl -fsS http://127.0.0.1:8000 >/dev/null

            echo "Deployment successful"

