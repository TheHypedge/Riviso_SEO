name: Deploy to VPS (Clean & Deterministic)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
group: deploy-vps
cancel-in-progress: true

jobs:
deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (Clean Install)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          script_stop: true
          script: |
            set -Eeuo pipefail

            APP_DIR="/var/www/auto-articles"
            REPO_URL="https://github.com/TheHypedge/Auto-Article-Generator.git"
            BRANCH="main"
            VENV_DIR="$APP_DIR/venv"

            echo "🚀 Starting clean deployment..."

            # -------------------------------
            # 1. Backup environment (critical)
            # -------------------------------
            echo "📦 Backing up environment..."
            BACKUP_ENV="/tmp/auto_articles_env_$(date +%s)"
            [[ -f "$APP_DIR/.env" ]] && cp "$APP_DIR/.env" "$BACKUP_ENV" || true

            # -------------------------------
            # 2. Remove old deployment
            # -------------------------------
            echo "🧹 Removing old deployment..."
            rm -rf "$APP_DIR"

            # -------------------------------
            # 3. Fresh clone (stateless deploy)
            # -------------------------------
            echo "📥 Cloning repository..."
            git clone --branch "$BRANCH" --depth 1 "$REPO_URL" "$APP_DIR"

            cd "$APP_DIR"

            # -------------------------------
            # 4. Restore environment
            # -------------------------------
            echo "🔐 Restoring environment..."
            [[ -f "$BACKUP_ENV" ]] && cp "$BACKUP_ENV" .env || true
            chmod 600 .env 2>/dev/null || true

            # -------------------------------
            # 5. Validate critical files
            # -------------------------------
            echo "✅ Validating code integrity..."

            if [[ ! -s "app.py" ]]; then
              echo "❌ ERROR: app.py is missing or empty"
              exit 1
            fi

            if [[ ! -f "requirements.txt" ]]; then
              echo "❌ ERROR: requirements.txt missing"
              exit 1
            fi

            # -------------------------------
            # 6. Setup virtual environment
            # -------------------------------
            echo "🐍 Setting up virtual environment..."

            python3 -m venv "$VENV_DIR"
            source "$VENV_DIR/bin/activate"

            python -m pip install --upgrade pip --quiet
            pip install -r requirements.txt --quiet

            # -------------------------------
            # 7. Run deployment script (optional)
            # -------------------------------
            if [[ -f "deploy/deploy.sh" ]]; then
              echo "⚙️ Running deploy script..."
              sed -i 's/\r$//' deploy/deploy.sh
              bash deploy/deploy.sh
            fi

            # -------------------------------
            # 8. Restart services
            # -------------------------------
            echo "🔄 Restarting services..."

            sudo systemctl restart gunicorn
            sudo systemctl restart nginx

            # -------------------------------
            # 9. Health check (hard fail)
            # -------------------------------
            echo "🩺 Running health check..."

            sleep 5

            if ! curl -fsS http://127.0.0.1:8000 > /dev/null; then
              echo "❌ Health check failed"
              exit 1
            fi

            echo "🎉 Deployment successful!"
