upstream backend_upstream {
  server backend:8000;
}

# Emit HSTS only when the original request arrived over HTTPS
# (TLS terminates at Cloudflare/edge which sets X-Forwarded-Proto).
map $http_x_forwarded_proto $hsts_value {
  default "";
  "https" "max-age=63072000; includeSubDomains; preload";
}

server {
  listen 80;
  server_name _;

  # Force HTTPS. Only redirects when edge forwarded an http request,
  # so direct local access (no X-Forwarded-Proto) keeps working.
  if ($http_x_forwarded_proto = "http") {
    return 301 https://$host$request_uri;
  }

  add_header Strict-Transport-Security $hsts_value always;

  # Gzip for API JSON responses.
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    application/json
    application/javascript
    application/xml
    application/xml+rss
    text/css
    text/javascript
    text/plain
    text/xml;

  # Increase body limit for image uploads (featured images, bulk import).
  client_max_body_size 20m;

  # All traffic → FastAPI backend.
  # Generation / WordPress publish / bulk import can exceed 60s —
  # read/send timeouts aligned with frontend LONG_API_TIMEOUT_MS (600s).
  location / {
    proxy_pass http://backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 75s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
  }
}
