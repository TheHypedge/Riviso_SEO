upstream backend_upstream {
  server backend:8000;
}

upstream frontend_upstream {
  server frontend:3000;
}

# I3.5: emit HSTS only when the original client request arrived over HTTPS
# (TLS terminates at the edge — Cloudflare / host LB — which forwards the scheme).
map $http_x_forwarded_proto $hsts_value {
  default "";
  "https" "max-age=63072000; includeSubDomains; preload";
}

server {
  listen 80;
  server_name _;

  # I3.5: force HTTPS. Only redirects when the edge explicitly forwarded an
  # http request, so direct local access (no X-Forwarded-Proto) keeps working.
  if ($http_x_forwarded_proto = "http") {
    return 301 https://$host$request_uri;
  }

  # I3.5: HSTS so browsers pin HTTPS for two years (only set on HTTPS requests).
  add_header Strict-Transport-Security $hsts_value always;

  # I3.5: compression for text-like payloads.
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    application/json
    application/javascript
    application/xml
    application/xml+rss
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  # Allow up to 25 MB uploads (manually uploaded featured images, bulk imports).
  client_max_body_size 25m;

  # Generation / WordPress publish / bulk import can exceed 60s — align with frontend LONG_API_TIMEOUT_MS (600s).
  location /api/ {
    proxy_pass http://backend_upstream/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 75s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
  }

  location / {
    proxy_pass http://frontend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
